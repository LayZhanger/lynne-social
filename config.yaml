server:
  port: 7890
  auto_open_browser: true

llm:
  provider: "deepseek"
  api_key: "${DEEPSEEK_API_KEY}"
  model: "deepseek-chat"
  relevance_threshold: 6

browser:
  headless: false
  slow_mo: 500

platforms:
  twitter:
    enabled: true
    session_file: "data/sessions/twitter_state.json"
    base_url: "https://x.com"
  rednote:
    enabled: true
    session_file: "data/sessions/rednote_state.json"
    base_url: "https://www.xiaohongshu.com"
  douyin:
    enabled: false
    session_file: "data/sessions/douyin_state.json"
    base_url: "https://www.douyin.com"

tasks:
  - name: "AI行业动态"
    platforms: ["twitter"]
    topic: "关注AI大模型的最新发布、技术突破、行业融资和重要论文"
    keywords: ["AI", "LLM", "大模型"]
    schedule: "every 4 hours"
    limit: 20
